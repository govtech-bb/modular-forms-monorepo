version: 1
applications:
  - frontend:
      phases:
        preBuild:
          commands:
            - npm install --ignore-scripts
        build:
          commands:
            - npx nx build web
      artifacts:
        baseDirectory: .next
        files:
          - "**/*"
      cache:
        paths:
          - node_modules/**/*
          - .nx/cache/**/*
    appRoot: apps/web
