version: 1
applications:
  - appRoot: apps/web
    frontend:
      buildPath: /
      phases:
        preBuild:
          commands:
            - npm install --ignore-scripts
        build:
          commands:
            - npx nx run form-types:build
            - npx nx run form-conditions:build
            - npx nx run form-registry:build
            - cd apps/web && npx next build && cd ../..
        postBuild:
          commands:
            - mkdir -p .amplify-hosting/compute/default
            - mkdir -p .amplify-hosting/static/_next/static
            - cp -r apps/web/.next/standalone/. .amplify-hosting/compute/default/
            - cp -r apps/web/.next/static/. .amplify-hosting/static/_next/static/
            - cp -r apps/web/public/. .amplify-hosting/static/
            - |
              cat > .amplify-hosting/deploy-manifest.json << 'EOF'
              {
                "version": 1,
                "routes": [
                  { "path": "/_next/static/*", "target": { "kind": "Static", "cacheControl": "public, max-age=31536000, immutable" } },
                  { "path": "/*.*", "target": { "kind": "Static" }, "fallback": { "kind": "Compute", "src": "default" } },
                  { "path": "/*", "target": { "kind": "Compute", "src": "default" } }
                ],
                "computeResources": [{ "name": "default", "runtime": "nodejs20.x", "entrypoint": "apps/web/server.js" }],
                "framework": { "name": "next", "version": "14.2.35" }
              }
              EOF
      artifacts:
        baseDirectory: .amplify-hosting
        files:
          - "**/*"
      cache:
        paths:
          - node_modules/**/*
          - .nx/cache/**/*
