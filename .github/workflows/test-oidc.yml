# Test workflow — copy this to modular-forms-monorepo/.github/workflows/test-oidc.yml
# Verifies that GitHub Actions can assume the AWS IAM role via OIDC.
# Delete or disable this workflow once TASK-002 acceptance criteria are confirmed.

name: Test OIDC Role Assumption

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  test-oidc:
    name: Verify AWS Role Assumption
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ca-central-1

      - name: Verify caller identity
        run: |
          echo "✅ Assumed role successfully"
          aws sts get-caller-identity
          echo ""
          echo "Confirming role name contains 'modular-forms-github-actions-role'..."
          ROLE=$(aws sts get-caller-identity --query 'Arn' --output text)
          echo "Role ARN: $ROLE"
          if [[ "$ROLE" == *"modular-forms-github-actions-role"* ]]; then
            echo "✅ Correct role assumed"
          else
            echo "❌ Unexpected role: $ROLE"
            exit 1
          fi

      - name: Verify ECR access
        run: |
          echo "Testing ECR auth token retrieval..."
          aws ecr get-authorization-token --region ca-central-1
          echo "✅ ECR auth token retrieved"

      - name: Verify Secrets Manager read access
        run: |
          echo "Testing Secrets Manager list (no secret required to exist yet)..."
          aws secretsmanager list-secrets \
            --region ca-central-1 \
            --filters Key=name,Values=sandbox/modular-forms/ \
            --query 'SecretList[].Name' \
            --output text || echo "No secrets found yet — that is expected at this stage"
          echo "✅ Secrets Manager access confirmed"
